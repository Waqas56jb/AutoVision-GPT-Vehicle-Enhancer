<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7faff" />
    <meta name="description" content="AutoVision GPT — AI-powered dealership-grade vehicle photo enhancement." />
    <title>AutoVision GPT — Vehicle Image Enhancer</title>
    <style>
      /* Painted before React boots, so the first frame is already on-theme
         instead of a white flash followed by a layout jump. */
      body {
        margin: 0;
        background: #f7faff;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #f7faff;
        transition: opacity 0.4s ease;
      }
      #boot.hide {
        opacity: 0;
        pointer-events: none;
      }
      #boot .ring {
        width: 44px;
        height: 44px;
        border-radius: 9999px;
        border: 3px solid #dbeafe;
        border-top-color: #2563eb;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot"><div class="ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // React has mounted by the time the module script finishes evaluating.
      window.addEventListener('load', () => {
        const boot = document.getElementById('boot');
        if (!boot) return;
        boot.classList.add('hide');
        setTimeout(() => boot.remove(), 450);
      });
    </script>
  </body>
</html>
